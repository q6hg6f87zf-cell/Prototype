<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Squad</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #05050a; color: #ffffff;
            font-family: sans-serif; overflow: hidden;
            touch-action: none; /* Stops the phone from fighting the nebula */
        }
        canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        #ui {
            position: relative; z-index: 10;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center;
        }
        h1 { color: #d35400; letter-spacing: 15px; margin: 0; font-size: 2rem; }
        p { color: #8b85a1; font-size: 0.7rem; letter-spacing: 3px; margin-top: 10px; }
        .box {
            border: 1px solid #9b1b1b; padding: 20px; margin-top: 40px;
            background: rgba(10, 5, 20, 0.8); border-radius: 8px; width: 80%;
        }
    </style>
</head>
<body>

    <canvas id="c"></canvas>

    <div id="ui">
        <h1>MOON SQUAD</h1>
        <p>LEADER: BRENT | GRANDE CACHE</p>
        
        <div class="box">
            <div style="color:#00d4ff; font-weight:bold; margin-bottom:10px;">SYSTEM LIVE</div>
            <div style="font-size: 0.8rem; color:#bbb;">Swipe sideways to ignite the nebula.</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let pts = [];
        let m = { x: 0, y: 0, active: false, sx: 0, sy: 0 };
        let drawing = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(x, y, color, size) {
                this.x = x; this.y = y; this.size = size;
                this.life = 1.0; this.color = color;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
            }
            draw() {
                ctx.globalAlpha = this.life;
                let g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                g.addColorStop(0, this.color);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (m.active && drawing) {
                pts.push(new Particle(m.x, m.y, '#9b1b1b', 60)); // Crimson
                if(Math.random() > 0.6) pts.push(new Particle(m.x, m.y, '#00d4ff', 25)); // Cyan
            }
            pts.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02; p.size += 0.5;
                p.draw();
                if(p.life <= 0) pts.splice(i, 1);
            });
            requestAnimationFrame(loop);
        }

        function start(e) {
            let t = e.touches ? e.touches[0] : e;
            m.active = true; m.sx = t.clientX; m.sy = t.clientY;
            m.x = t.clientX; m.y = t.clientY; drawing = false;
        }

        function move(e) {
            let t = e.touches ? e.touches[0] : e;
            m.x = t.clientX; m.y = t.clientY;
            if(!drawing) {
                if(Math.abs(t.clientX - m.sx) > 15) drawing = true;
            }
        }

        window.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', () => { m.active = false; });
        window.addEventListener('touchstart', start);
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', () => { m.active = false; });

        loop();
    </script>
</body>
</html>
