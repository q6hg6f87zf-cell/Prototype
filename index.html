<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hollow Realm — High-Precision Wake</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #020208; color: #fff;
            font-family: 'Inter', sans-serif; overflow: hidden;
            touch-action: none;
        }

        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        #ui-layer {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .hq-card {
            background: rgba(10, 8, 30, 0.9);
            border: 1px solid rgba(196, 130, 72, 0.4);
            border-radius: 15px; padding: 30px; width: 280px;
            text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
            pointer-events: auto;
        }

        .label { font-size: 0.6rem; color: #c48248; letter-spacing: 3px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <canvas id="trailCanvas"></canvas>

    <div id="ui-layer">
        <div class="label">WARDEN'S HAND</div>
        <div class="hq-card" id="card1">MOON SQUAD HQ</div>
        <div style="height:20px;"></div>
        <div class="hq-card" id="card2">THE HOLLOW'S EDGE</div>
    </div>

    <script>
        const canvas = document.getElementById('trailCanvas');
        const ctx = canvas.getContext('2d');
        const cards = document.querySelectorAll('.hq-card');

        let points = [];
        let mouse = { x: 0, y: 0, active: false };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // THE TRAIL POINT LOGIC
        function addPoint(x, y) {
            points.push({
                x: x,
                y: y,
                age: 0,
                force: 10
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (points.length > 1) {
                ctx.beginPath();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#9d72ff';
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                for (let i = 0; i < points.length; i++) {
                    const p = points[i];
                    const nextP = points[i + 1];

                    // Draw the segment
                    if (nextP) {
                        const opacity = 1 - (p.age / 40);
                        const width = 8 * (1 - p.age / 40);
                        
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(nextP.x, nextP.y);
                        ctx.strokeStyle = `rgba(157, 114, 255, ${opacity})`;
                        ctx.lineWidth = width;
                        ctx.stroke();
                        
                        // Add "Static" Flickers
                        if (Math.random() > 0.8) {
                            ctx.fillStyle = '#fff';
                            ctx.fillRect(p.x + (Math.random()-0.5)*10, p.y + (Math.random()-0.5)*10, 2, 2);
                        }
                    }

                    p.age++;
                    if (p.age > 40) {
                        points.splice(i, 1);
                        i--;
                    }
                }
            }

            // Physics: Cards react to the path
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const cx = rect.left + rect.width / 2;
                const cy = rect.top + rect.height / 2;
                
                const dx = cx - mouse.x;
                const dy = cy - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 150 && mouse.active) {
                    const angle = Math.atan2(dy, dx);
                    const push = (150 - dist) / 6;
                    card.style.transform = `translate(${Math.cos(angle)*push}px, ${Math.sin(angle)*push}px) rotate(${push/4}deg)`;
                } else {
                    card.style.transform = `translate(0, 0) rotate(0deg)`;
                }
            });

            requestAnimationFrame(animate);
        }

        function handleInput(e) {
            const t = e.touches ? e.touches[0] : e;
            mouse.x = t.clientX;
            mouse.y = t.clientY;
            if (mouse.active) {
                addPoint(mouse.x, mouse.y);
            }
        }

        window.addEventListener('mousedown', (e) => { mouse.active = true; handleInput(e); });
        window.addEventListener('mouseup', () => { mouse.active = false; });
        window.addEventListener('mousemove', handleInput);

        window.addEventListener('touchstart', (e) => { mouse.active = true; handleInput(e); });
        window.addEventListener('touchend', () => { mouse.active = false; });
        window.addEventListener('touchmove', handleInput);

        animate();
    </script>
</body>
</html>
