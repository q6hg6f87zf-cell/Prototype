<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Squad — May 2nd Launch</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #020205; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            touch-action: none;
        }
        canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        
        /* INTRO LAYER */
        #intro-overlay {
            position: fixed; inset: 0; z-index: 100;
            background: #020205; display: flex; align-items: center; justify-content: center;
            transition: opacity 1s ease-out;
        }
        #intro-circle {
            width: 150px; height: 150px; border-radius: 50%;
            border: 2px solid #00d4ff; box-shadow: 0 0 30px #9b1b1b;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; letter-spacing: 5px; color: #d35400;
            animation: pulse 2s infinite; cursor: pointer;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        /* CONTENT LAYER */
        #content {
            position: relative; z-index: 10; width: 100%; height: 100vh;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
            opacity: 0; transition: opacity 2s;
        }
        .hq-card {
            background: rgba(10, 5, 20, 0.9);
            border-left: 3px solid #00d4ff; border-right: 3px solid #9b1b1b;
            padding: 25px; margin-bottom: 20px; border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="intro-overlay" onclick="launchSystem()">
        <div id="intro-circle">IGNITE</div>
    </div>

    <canvas id="nebulaCanvas"></canvas>

    <div id="content">
        <h1 style="color: #d35400; text-align: center; letter-spacing: 12px; margin-top: 50px;">MOON SQUAD</h1>
        <div class="hq-card">
            <h3 style="color:#00d4ff">MISSION_CLOCK: READY</h3>
            <p style="color:#8b85a1">Launch Date: <b>May 2, 2026</b>. The Hollow Realm is initializing. Swipe to check the perimeter.</p>
        </div>
        <div style="height: 600px;"></div>
    </div>

    <script>
        const canvas = document.getElementById('nebulaCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: 0, y: 0, active: false, startX: 0, startY: 0 };
        let isDrawing = false;

        function launchSystem() {
            document.getElementById('intro-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro-overlay').style.display = 'none';
                document.getElementById('content').style.opacity = '1';
                // Trigger an initial burst of nebula
                for(let i=0; i<50; i++) {
                    particles.push(new MoonStatic(window.innerWidth/2, window.innerHeight/2, '#9b1b1b', 80, 5));
                }
            }, 1000);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class MoonStatic {
            constructor(x, y, color, size, speed) {
                this.x = x; this.y = y; this.size = size; this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.01; this.color = color;
                this.vx = (Math.random() - 0.5) * speed; this.vy = (Math.random() - 0.5) * speed;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; this.size += 0.5; }
            draw() {
                ctx.globalAlpha = this.life;
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                g.addColorStop(0, this.color); g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (mouse.active && isDrawing) {
                particles.push(new MoonStatic(mouse.x, mouse.y, '#9b1b1b', 50, 1));
                if (Math.random() > 0.5) particles.push(new MoonStatic(mouse.x, mouse.y, '#00d4ff', 20, 3));
            }
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }

        function handleStart(e) {
            const t = e.touches ? e.touches[0] : e;
            mouse.active = true; mouse.startX = t.clientX; mouse.startY = t.clientY;
            mouse.x = t.clientX; mouse.y = t.clientY; isDrawing = false;
        }

        function handleMove(e) {
            const t = e.touches ? e.touches[0] : e;
            mouse.x = t.clientX; mouse.y = t.clientY;
            if (!isDrawing) {
                const dx = Math.abs(t.clientX - mouse.startX);
                const dy = Math.abs(t.clientY - mouse.startY);
                if (dx > 25 && dx > dy) isDrawing = true;
            }
        }

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => { mouse.active = false; isDrawing = false; });
        window.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', () => { mouse.active = false; isDrawing = false; });

        animate();
    </script>
</body>
</html>
