<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hollow Realm — Precision Warden Wake</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; color: #fff;
            font-family: 'Inter', sans-serif; overflow: hidden;
            touch-action: none;
        }

        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        #ui-layer {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            pointer-events: none;
        }

        .hq-card {
            background: rgba(10, 8, 30, 0.9);
            border: 1px solid rgba(196, 130, 72, 0.4);
            border-radius: 15px; padding: 30px; width: 280px;
            text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5);
            transition: transform 0.1s ease-out;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <canvas id="trailCanvas"></canvas>

    <div id="ui-layer">
        <div class="hq-card" id="card1">MOON SQUAD HQ</div>
        <div style="height:20px;"></div>
        <div class="hq-card" id="card2">THE HOLLOW'S EDGE</div>
    </div>

    <script>
        const canvas = document.getElementById('trailCanvas');
        const ctx = canvas.getContext('2d');
        const cards = document.querySelectorAll('.hq-card');

        let points = [];
        let mouse = { x: -100, y: -100, active: false };

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. CONSTANT POINT GENERATION (The Glue)
            // If the finger is down, we force a point every frame regardless of movement
            if (mouse.active) {
                points.push({ x: mouse.x, y: mouse.y, age: 0 });
            }

            if (points.length > 1) {
                // Glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#9d72ff';

                for (let i = 0; i < points.length; i++) {
                    const p = points[i];
                    const nextP = points[i + 1];

                    if (nextP) {
                        const opacity = 1 - (p.age / 35);
                        const width = 10 * (1 - p.age / 35);
                        
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(nextP.x, nextP.y);
                        ctx.strokeStyle = `rgba(157, 114, 255, ${opacity})`;
                        ctx.lineWidth = width;
                        ctx.lineCap = 'round';
                        ctx.stroke();
                        
                        // Static "Glitch" Sparks along the trail
                        if (Math.random() > 0.9) {
                            ctx.fillStyle = '#fff';
                            ctx.fillRect(p.x + (Math.random()-0.5)*15, p.y + (Math.random()-0.5)*15, 2, 2);
                        }
                    }

                    p.age += 1; // How fast the trail disappears
                    if (p.age > 35) {
                        points.splice(i, 1);
                        i--;
                    }
                }
            }

            // Physics: Cards shivering when the hand is near
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const dx = (rect.left + rect.width / 2) - mouse.x;
                const dy = (rect.top + rect.height / 2) - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);

                if (dist < 140 && mouse.active) {
                    const push = (140 - dist) / 5;
                    const angle = Math.atan2(dy, dx);
                    card.style.transform = `translate(${Math.cos(angle)*push}px, ${Math.sin(angle)*push}px) rotate(${push/3}deg)`;
                } else {
                    card.style.transform = `translate(0,0) rotate(0deg)`;
                }
            });

            requestAnimationFrame(animate);
        }

        // INPUT LISTENERS (Direct tracking)
        function updatePos(e) {
            const t = e.touches ? e.touches[0] : e;
            mouse.x = t.clientX;
            mouse.y = t.clientY;
        }

        window.addEventListener('mousedown', (e) => { mouse.active = true; updatePos(e); });
        window.addEventListener('mouseup', () => { mouse.active = false; });
        window.addEventListener('mousemove', updatePos);

        window.addEventListener('touchstart', (e) => { mouse.active = true; updatePos(e); });
        window.addEventListener('touchend', () => { mouse.active = false; });
        window.addEventListener('touchmove', (e) => { e.preventDefault(); updatePos(e); }, { passive: false });

        animate();
    </script>
</body>
</html>
