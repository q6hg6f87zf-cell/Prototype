<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>The Hollow Realm — GM Suite</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --dim: #c8c0e8; 
    }

    .player-card {
      background: rgba(10, 8, 30, 0.85) !important;
      backdrop-filter: blur(15px) !important; 
      -webkit-backdrop-filter: blur(15px) !important;
      border: 1px solid rgba(196, 130, 72, 0.3) !important;
    }

    .card {
      background: rgba(10, 8, 30, 0.85) !important;
      backdrop-filter: blur(15px) !important; 
      -webkit-backdrop-filter: blur(15px) !important;
    }

    /* --- THE PANTHEON CSS --- */
    .stone-card {
      background: rgba(15, 15, 20, 0.95) !important;
      border: 1px solid #444 !important;
      filter: grayscale(0.7);
      box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
    }
    .hof-card {
      background: linear-gradient(135deg, rgba(40,30,10,0.9), rgba(10,8,30,0.95)) !important;
      border: 1px solid var(--gold) !important;
      box-shadow: 0 0 15px rgba(212, 175, 55, 0.2) !important;
    }
    .hof-log {
      background: linear-gradient(90deg, rgba(212,175,55,0.15), transparent) !important;
      border-left: 3px solid var(--gold) !important;
      animation: shine 2s infinite alternate;
    }
    @keyframes shine {
      0% { box-shadow: inset 5px 0 10px rgba(212,175,55,0.1); }
      100% { box-shadow: inset 15px 0 20px rgba(212,175,55,0.4); }
    }

    .header-badge {
      background: linear-gradient(135deg, #c48248, #8b5a2b) !important;
      box-shadow: 0 0 12px rgba(196, 130, 72, 0.5) !important;
      border: 1px solid #e2a870 !important;
    }

    .btn-purple {
      background: linear-gradient(135deg, #c48248, #8b5a2b) !important;
      border: 1px solid #e2a870 !important;
      box-shadow: 0 0 15px rgba(196, 130, 72, 0.4) !important;
    }

    .tab.active {
      color: #e2a870 !important;
      border-bottom-color: #c48248 !important;
    }

    .arsenal-tab.active {
      border-color: #c48248 !important;
      background: rgba(196, 130, 72, 0.15) !important;
      color: #e2a870 !important;
    }

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body {
      font-family: 'Inter', sans-serif;
      background: #050510; 
      color: #e8e0ff; 
      min-height: 100vh; 
      overflow-x: hidden;
    }

    /* --- ABSOLUTE SYNC BACKGROUND & CANVAS --- */
    #bg-layer {
      position: fixed; 
      top: -10%; left: -10%; 
      width: 120%; height: 120%;
      background-image: url('IMG_5121.png');
      background-size: cover; 
      background-position: center;
      z-index: -2; 
      pointer-events: none;
      transition: transform 0.1s ease-out;
      filter: brightness(0.8);
    }

    canvas#c { 
      position: fixed; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      z-index: -1; 
      pointer-events: none; 
    }

    #app{max-width:480px;margin:0 auto;min-height:100vh;background:transparent}
    .header{background:rgba(10,8,30,0.98);border-bottom:1px solid var(--border);padding:12px 16px;position:sticky;top:0;z-index:50}
    .header-title{font-weight:bold;font-size:0.9rem;color:#fff;letter-spacing:2px}
    .header-title span{color:var(--purple-light)}
    .header-sub{font-size:0.55rem;color:var(--dim);letter-spacing:1px;font-family:Arial,sans-serif}
    
    .tabs{display:flex;overflow-x:auto;gap:0;background:rgba(5,4,18,0.98);border-bottom:1px solid var(--border);scrollbar-width:none;-webkit-overflow-scrolling:touch}
    .tabs::-webkit-scrollbar{display:none}
    .tab{padding:10px 12px;font-size:0.65rem;color:var(--dim);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all 0.15s;font-family:Arial,sans-serif;flex-shrink:0}
    .panel{padding:12px 12px 80px}
    
    .card-glow{background:linear-gradient(135deg,rgba(30,20,60,0.7),rgba(10,8,30,0.8));border:1px solid var(--border-glow);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 0 30px rgba(138,90,220,0.15); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);}

    .btn{display:inline-flex;align-items:center;justify-content:center;padding:9px 16px;border-radius:8px;border:none;cursor:pointer;font-family:Arial,sans-serif;font-size:0.75rem;font-weight:bold;transition:all 0.15s;gap:5px}
    .btn-sm{padding:5px 10px;font-size:0.65rem;border-radius:6px;border:1px solid var(--border);background:rgba(138,90,220,0.15);color:var(--purple-light);cursor:pointer;font-family:Arial,sans-serif}
    .btn-red{background:rgba(80,10,10,0.9);color:var(--red);border:1px solid rgba(239,83,80,0.3)}
    .btn-green{background:rgba(10,50,20,0.9);color:var(--green);border:1px solid rgba(102,187,106,0.3)}
    .btn-full{width:100%;display:block;text-align:center}
    
    .input{background:rgba(10,8,30,0.9);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:#fff;font-size:0.78rem;font-family:Arial,sans-serif;width:100%;outline:none}
    .input:focus{border-color:var(--purple)}
    .select{background:rgba(10,8,30,0.9);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:#fff;font-size:0.75rem;font-family:Arial,sans-serif;width:100%;outline:none;-webkit-appearance:none}
    .textarea{background:rgba(10,8,30,0.9);border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:#fff;font-size:0.75rem;font-family:Arial,sans-serif;width:100%;outline:none;resize:vertical;min-height:70px}
    .label{display:block;font-size:0.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;font-family:Arial,sans-serif}
    .tag{display:inline-block;padding:2px 7px;border-radius:8px;font-size:0.58rem;font-family:Arial,sans-serif;margin:1px}
    
    .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;margin-top:8px}
    .stat-label{display:flex;justify-content:space-between;font-size:0.58rem;font-family:Arial,sans-serif;margin-bottom:2px}
    .stat-bar-wrap{height:3px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
    .stat-bar{height:100%;border-radius:2px}
    
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(2,1,15,0.97);z-index:200;overflow-y:auto;padding:16px}
    .modal-overlay.active{display:block}
    .modal-box{background:rgba(15,12,40,0.99);border:1px solid var(--border-glow);border-radius:12px;padding:18px;max-width:480px;margin:0 auto;box-shadow:0 0 40px rgba(138,90,220,0.2)}
    
    .player-card{transition:border-color 0.2s}
    .player-card.protected{border-color:rgba(255,213,79,0.4)}
    .player-card.dead{opacity:0.6;border-color:rgba(239,83,80,0.3)}
    
    .pill-curse{background:rgba(50,10,60,0.8);color:#e1bee7}
    .pill-wanted{background:rgba(60,10,10,0.8);color:#ffcdd2}
    .pill-exile{background:rgba(20,20,30,0.8);color:#bbb}
    .pill-servant{background:rgba(5,30,25,0.8);color:#b2dfdb}
    
    .roll-box{background:rgba(8,6,25,0.9);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:8px}
    .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);margin:12px 0}
    .session-live{display:inline-block;width:7px;height:7px;border-radius:50%;background:#66bb6a;box-shadow:0 0 6px #66bb6a;animation:pulse 1.5s ease-in-out infinite;margin-right:5px}
    
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
    .phase-bar{display:flex;gap:3px}
    .phase-pip{flex:1;height:5px;border-radius:3px;transition:all 0.2s}
    @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    .spinning{animation:spin 0.15s linear infinite;transform-origin:center}
    @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn 0.25s ease forwards}
    
    .empty-state{text-align:center;color:var(--dimmer);padding:50px 16px;font-size:0.82rem}
    .empty-icon{font-size:2.5rem;margin-bottom:10px}
    .info-bar{background:rgba(138,90,220,0.08);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:0.68rem;color:var(--dim);font-family:Arial,sans-serif;margin-bottom:10px;line-height:1.5}
    
    .lore-tab-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:12px}
    .lore-tab{padding:5px 10px;border-radius:14px;font-size:0.62rem;font-family:Arial,sans-serif;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--dim);transition:all 0.15s}
    .lore-tab.active{background:rgba(138,90,220,0.2);color:var(--purple-light);border-color:var(--purple)}
    
    .item-card{background:rgba(8,6,25,0.8);border-radius:6px;padding:8px 10px;margin-bottom:6px}
    .log-entry{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
    .log-time{flex-shrink:0;width:52px;text-align:right;font-size:0.58rem;color:var(--dim);font-family:Arial,sans-serif;padding-top:1px}
    .log-icon{flex-shrink:0;width:20px;text-align:center;font-size:0.8rem}
    .log-body{flex:1}
    .log-who{font-size:0.7rem;font-weight:bold;font-family:Arial,sans-serif}
    .log-what{font-size:0.72rem;color:var(--text);font-family:Arial,sans-serif;margin-top:1px}
    
    .arsenal-nav { display:flex; gap:6px; overflow-x:auto; margin-bottom:14px; padding-bottom:5px; scrollbar-width:none; }
    .arsenal-nav::-webkit-scrollbar { display:none; }
    .arsenal-tab { padding:8px 14px; border-radius:20px; cursor:pointer; border:1px solid var(--border); background:rgba(10,8,30,0.8); color:var(--dim); white-space:nowrap; font-size:0.7rem; font-family:Arial,sans-serif; transition:all 0.2s; }
    .arsenal-tab.active { border-color:var(--purple); background:rgba(138,90,220,0.15); color:var(--purple-light); font-weight:bold; }
    
    .log-entry {
      background: rgba(10, 8, 30, 0.9) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      padding: 10px !important;
      border-radius: 8px !important;
      margin-bottom: 6px !important;
      border: 1px solid rgba(196, 130, 72, 0.2) !important;
    }
    .info-bar {
      background: rgba(10, 8, 30, 0.85) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(196, 130, 72, 0.3) !important;
      color: #fff !important;
    }

    .arsenal-tab, .lore-tab {
      background: rgba(10, 8, 30, 0.85) !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
      color: #fff !important;
    }
    .arsenal-tab.active, .lore-tab.active {
      background: rgba(196, 130, 72, 0.25) !important;
      border-color: #c48248 !important;
      color: #e2a870 !important;
    }
  </style>
</head>
<body>

<div id="ui-header" style="position: absolute; width: 100%; text-align: center; top: 10px; z-index: -1; pointer-events: none; opacity: 0.3;">

</div>

<div id="app">

</div>

function renderHearts(hp, maxHp) {
  const validMax = maxHp || 10;
  const validHp = isNaN(hp) ? 0 : hp;
  let hearts = '';
  for(let i = 0; i < validMax; i++) {
    if(i < validHp) { hearts += '<span style="color:#ef5350; text-shadow:0 0 6px rgba(239,83,80,0.6); font-size:0.8rem;">❤️</span>'; } 
    else { hearts += '<span style="color:#2a1f5e; opacity:0.6; font-size:0.8rem;">🖤</span>'; }
  }
  return `<div style="display:flex; flex-wrap:wrap; gap:3px; margin:4px 0 8px 0">${hearts}</div>`;
}

function getRep(cls, roll) { return (REP[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function getWeapon(cls, roll) { return (WEAPONS[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function getTrait(roll) { return TRAIT_TIERS.find(t => roll >= t.range[0] && roll <= t.range[1]); }
function getSkill(cls, roll) { return (SIGNATURE_SKILLS[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function getShadow(cls, roll) { return (SHADOW_TRAITS[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function getEnchant(cls, roll) { return (ENCHANTMENTS[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function getDestiny(cls, roll) { return (DESTINY_THREADS[cls]||[]).find(r => roll >= r.r[0] && roll <= r.r[1]); }
function d20() { return Math.floor(Math.random() * 20) + 1; }
function getDiceDisplay(r) {
  if (!r) return null;
  if (r === 1) return {label:"💀 FUMBLE",desc:"Catastrophic backfire.",bg:"#b71c1c",glow:"#ef5350"};
  if (r <= 4) return {label:"✗ FAIL",desc:"Action fails entirely.",bg:"#c62828",glow:"#ef5350"};
  if (r <= 9) return {label:"⚠ WEAK HIT",desc:"Partial — something goes wrong.",bg:"rgba(100,40,5,0.95)",glow:"#ff9800"};
  if (r <= 14) return {label:"✓ SUCCESS",desc:"Clean success.",bg:"rgba(10,50,20,0.95)",glow:"#4caf50"};
  if (r <= 19) return {label:"★ STRONG HIT",desc:"Success + bonus effect.",bg:"rgba(5,30,80,0.95)",glow:"#4fc3f7"};
  return {label:"⚡ CRITICAL!",desc:"LEGENDARY. ANNOUNCE IT.",bg:"rgba(60,10,100,0.95)",glow:"#ce93d8"};
}

function getPlayerStats(p) {
  const base = CLASS_BASE_STATS[p.cls] || {STR:5,DEF:5,INT:5,WIS:5,SPD:5,CHA:5,LCK:5};
  const trait = TRAIT_TIERS.find(t => t.level === p.traitLevel);
  const traitBonus = trait ? trait.bonus : 0;
  const raceStats = p.race && RACES[p.race] ? RACES[p.race].stats : {STR:0,DEF:0,INT:0,WIS:0,SPD:0,CHA:0,LCK:0};
  const primary = PRIMARY_STAT[p.cls] || "STR";
  
  let gearDefBonus = 0;
  let gearSpdBonus = 0;
  
  if (p.inventory) {
    p.inventory.forEach(invItem => {
      if (invItem.equipped) {
        for (const cls in ARSENAL_ARMOR) {
          const foundArmor = ARSENAL_ARMOR[cls].find(a => a.name === invItem.name);
          if (foundArmor) {
            const defMatch = foundArmor.defense.match(/\+(\d+)\s+DEF/);
            if (defMatch) gearDefBonus += parseInt(defMatch[1]);
            if (foundArmor.effect.includes("-1 SPD")) gearSpdBonus -= 1;
            if (foundArmor.effect.includes("-2 SPD")) gearSpdBonus -= 2;
          }
        }
      }
    });
  }
  
  let finalStats = {};
  for (let s in base) {
     let calc = base[s] + raceStats[s] + (s === primary ? traitBonus : 0);
     
     if (s === 'DEF') calc += gearDefBonus;
     if (s === 'SPD') calc += gearSpdBonus;
     
     if (p.companion && p.companion.status === 'active') {
       const cData = COMPANION_TYPES[p.companion.type];
       if (cData.statBuff && cData.statBuff[s]) calc += cData.statBuff[s];
     }
     
     if (p.isHoF && s === 'CHA') calc += 3;
     finalStats[s] = (p.statOverrides && p.statOverrides[s] !== undefined) ? p.statOverrides[s] : calc;
  }
  return finalStats;
}

function addLog(entry) {
  const now = new Date();
  const e = { id: Date.now() + Math.random(), time: now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'}), session: STATE.sessionActive ? STATE.sessionNumber : 'Prep', ...entry };
  STATE.sessionLog.push(e); save('session_log', STATE.sessionLog);
}

function updatePlayer(id, updates) {
  const idx = STATE.players.findIndex(p => p.id === id);
  if (idx > -1) { STATE.players[idx] = {...STATE.players[idx], ...updates}; save('players', STATE.players); }
}

function overrideStat(id, stat, val) {
  const p = STATE.players.find(x => x.id === id);
  if(!p) return;
  if(!p.statOverrides) p.statOverrides = {};
  if(val === '' || val === null) {
    delete p.statOverrides[stat]; 
    addLog({type:'note', who:p.charname, what:`Cleared GM Override for ${stat}.`});
  } else {
    p.statOverrides[stat] = parseInt(val);
    addLog({type:'note', who:p.charname, what:`GM Override: ${stat} manually set to ${val}.`});
  }
  saveAll(); render();
}

function updateVillainPhase(id, phaseIdx) {
  if (!STATE.villainPhases) STATE.villainPhases = {};
  STATE.villainPhases[id] = phaseIdx;
  addLog({type:'battle', who:'System', what:`Boss Phase Shift: Phase ${phaseIdx + 1} activated.`});
  saveAll(); render();
}

function overrideVillain(id, stat, val) {
  if (!STATE.villainOverrides) STATE.villainOverrides = {};
  if (!STATE.villainOverrides[id]) STATE.villainOverrides[id] = {};
  if (val === '' || val === null) {
    delete STATE.villainOverrides[id][stat];
  } else {
    STATE.villainOverrides[id][stat] = parseInt(val);
    addLog({type:'battle', who:'DM', what:`Boss ${stat} overridden to ${val}.`});
  }
  saveAll(); render();
}

function buyCompanion(playerId, type) {
  const p = STATE.players.find(x => x.id === playerId);
  const cData = COMPANION_TYPES[type];
  if (!p || !cData) return;
  p.companion = { type: type, hp: cData.hp, maxHp: cData.hp, status: 'active', xp: 0 };
  addLog({type:'gift', who:p.charname, what:`Purchased a ${type} companion (1,000 coins).`});
  saveAll(); render();
}

function adjCompanionHP(playerId, delta) {
  const p = STATE.players.find(x => x.id === playerId);
  if (!p || !p.companion) return;
  p.companion.hp = Math.max(0, Math.min(p.companion.maxHp, p.companion.hp + delta));
  if (p.companion.hp === 0 && p.companion.status === 'active') {
    p.companion.status = 'fled';
    addLog({type:'death', who:p.charname, what:`Companion (${p.companion.type}) fled to HQ!`});
  }
  saveAll(); render();
}

function healCompanion(playerId) {
  const p = STATE.players.find(x => x.id === playerId);
  if (!p || !p.companion) return;
  const cData = COMPANION_TYPES[p.companion.type];
  p.companion.hp = cData.hp;
  p.companion.status = 'active';
  addLog({type:'heal', who:p.charname, what:`Companion ${p.companion.type} restored at Infirmary.`});
  saveAll(); render();
}

function adjHP(id, delta) {
  const p = STATE.players.find(x => x.id === id); if (!p) return;
  const nh = Math.max(0, Math.min(p.maxHp, p.hp + delta)); updatePlayer(id, {hp: nh});
  addLog({type:'hp', who:p.charname, what:`HP ${delta>0?'+':''}${delta} → ${nh}/${p.maxHp}`});
  if (nh === 0) addLog({type:'death', who:p.charname, what:`${p.charname} DOWNED at 0 HP`});
}

function renderCreate(){
const c=STATE.creation;
const trait=c.traitRoll?getTrait(c.traitRoll):null;
const base=c.cls?CLASS_BASE_STATS[c.cls]:null;

return`<div class="card"> <div class="section-title">New Character Forge</div> 
<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
  <button class="btn btn-sm ${c.payment==='tiktok'?'btn-purple':''}" style="${c.payment==='tiktok'?'':'background:rgba(10,8,30,0.8)'}" onclick="STATE.creation.payment='tiktok';render()">🪙 TikTok Coin</button>
  <button class="btn btn-sm ${c.payment==='paypal'?'btn-green':''}" style="${c.payment==='paypal'?'':'background:rgba(10,8,30,0.8)'}" onclick="STATE.creation.payment='paypal';render()">💳 PayPal (80%)</button>
</div>
<div style="margin-bottom:8px"><label class="label">TikTok Username</label><input class="input" value="${esc(c.username)}" oninput="STATE.creation.username=this.value" placeholder="@username"></div> 
<div style="margin-bottom:8px">
  <label class="label">Character Name</label> 
  <select class="select" onchange="if(this.value==='custom'){ STATE.creation.charname=''; STATE.creation.isCustomName=true; } else { STATE.creation.charname=this.value; STATE.creation.isCustomName=false; } render()"> 
    <option value="">— Select Name —</option> 
    ${NAMES.filter(n=>!STATE.players.find(p=>p.charname===n&&!p.isDead)).map(n=>`<option value="${n}" ${c.charname===n && !c.isCustomName ?'selected':''}>${n}</option>`).join('')} 
    <option value="custom" ${c.isCustomName ? 'selected' : ''}>✏️ Custom Name...</option>
  </select>
  ${c.isCustomName ? `<input class="input" style="margin-top:6px; border-color:var(--gold)" placeholder="Type custom name..." value="${esc(c.charname)}" oninput="STATE.creation.charname=this.value">` : ''}
</div> 

<div style="margin-bottom:8px"><label class="label">Race / Heritage</label> <select class="select" onchange="STATE.creation.race=this.value;render()"> <option value="">— Select Race —</option> ${Object.keys(RACES).map(r=>`<option value="${r}"${c.race===r?' selected':''}>${RACES[r].icon} ${r}</option>`).join('')} </select></div> 
<div style="margin-bottom:8px"><label class="label">Class</label> <select class="select" onchange="STATE.creation={...STATE.creation,cls:this.value,repRoll:null,traitRoll:null,weaponRoll:null,skillRoll:null,shadowRoll:null,enchantRoll:null,destinyRoll:null};render()"> <option value="">— Select Class —</option> ${CLASSES.map(cl=>`<option value="${cl}"${c.cls===cl?' selected':''}>${CLASS_ICON[cl]} ${cl} — HP ${CLASS_HP[cl]}</option>`).join('')} </select></div> 
${base?`<div class="roll-box" style="margin-bottom:8px">
<div style="font-size:0.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;font-family:Arial,sans-serif">Calculated Base Stats</div>
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">
${Object.entries(base).map(([s,v])=>{
  const col=STAT_COLORS[s];
  const traitBonus=trait&&PRIMARY_STAT[c.cls]===s?trait.bonus:0;
  const raceBonus=c.race?RACES[c.race].stats[s]:0;
  const total=v+traitBonus+raceBonus;
  return`<div style="text-align:center"><div style="font-size:0.56rem;color:var(--dim);font-family:Arial,sans-serif">${s}</div><div style="font-size:0.9rem;font-weight:bold;color:${col}">${total}${traitBonus||raceBonus?`<span style="font-size:0.5rem;color:var(--green)">${raceBonus>0?'+'+raceBonus:raceBonus<0?raceBonus:''}${traitBonus>0?'(T+'+traitBonus+')':''}</span>`:''}</div></div>`;
}).join('')}
</div></div>`:'' } 
<div style="margin-bottom:8px"><label class="label">Origin</label> <select class="select" onchange="STATE.creation.origin=this.value"> <option value="">— Select Origin —</option> ${ORIGINS.map(o=>`<option${c.origin===o?' selected':''}>${o}</option>`).join('')} </select></div>
<div style="display:flex; gap:10px; margin-bottom:12px">
  <div style="flex:1">
    <label class="label">Player Photo</label>
    ${c.playerImg ? `<img src="${c.playerImg}" style="width:100%; height:60px; object-fit:cover; border-radius:6px; margin-bottom:4px; border:1px solid var(--border)">` : ''}
    <input type="file" accept="image/*" class="input" style="font-size:0.6rem; padding:4px" onchange="handleImageUpload(this, 'playerImg')">
  </div>
  <div style="flex:1">
    <label class="label">Character Avatar</label>
    ${c.charImg ? `<img src="${c.charImg}" style="width:100%; height:60px; object-fit:cover; border-radius:6px; margin-bottom:4px; border:1px solid var(--border)">` : ''}
    <input type="file" accept="image/*" class="input" style="font-size:0.6rem; padding:4px" onchange="handleImageUpload(this, 'charImg')">
  </div>
</div>
<div style="margin-bottom:12px"><label class="label">Notes</label><textarea class="textarea" oninput="STATE.creation.notes=this.value" placeholder="Player notes...">${esc(c.notes)}</textarea></div>

<button class="btn btn-purple btn-full" style="margin-top:12px" onclick="addPlayer()">✦ Add to The Hollow Realm</button> </div>`;

function renderCreationRolls(c){
const rolls=[
{key:'repRoll',label:'Roll 1 — Reputation Title',fn:r=>getRep(c.cls,r),nameKey:'title',descKey:'passive',col:'#ffb300',
opts:(REP[c.cls]||[]).map(r=>`<option value="${r.r[0]}">${rangeLabel(r.r)} — ${r.title}</option>`).join('')},
{key:'traitRoll',label:'Roll 2 — Trait Effectiveness',fn:r=>getTrait(r),nameKey:'level',descKey:null,col:'#ce93d8',
opts:TRAIT_TIERS.map((t,i)=>{const rr=[[1,4],[5,9],[10,14],[15,19],[20,20]][i];return`<option value="${rr[0]}">${rangeLabel(rr)} — ${t.level}</option>`;}).join('')},
{key:'weaponRoll',label:'Roll 3 — Starting Weapon',fn:r=>getWeapon(c.cls,r),nameKey:'name',descKey:'special',
col:r=>{const w=getWeapon(c.cls,r);return RARITY_COLOR[w?.rarity]||'#bbb';},
opts:(WEAPONS[c.cls]||[]).map(w=>`<option value="${w.r[0]}">${rangeLabel(w.r)} — ${w.name} [${w.rarity}]</option>`).join('')},
{key:'skillRoll',label:'Roll 4 — Signature Skill',fn:r=>getSkill(c.cls,r),nameKey:'name',descKey:'desc',col:'#4fc3f7',
opts:(SIGNATURE_SKILLS[c.cls]||[]).map(s=>`<option value="${s.r[0]}">${rangeLabel(s.r)} — ${s.name}</option>`).join('')},
{key:'shadowRoll',label:'Roll 5 — Shadow Trait',fn:r=>getShadow(c.cls,r),nameKey:'name',descKey:'desc',col:'#ef5350',
opts:(SHADOW_TRAITS[c.cls]||[]).map(s=>`<option value="${s.r[0]}">${rangeLabel(s.r)} — ${s.name}</option>`).join('')},
{key:'enchantRoll',label:'Roll 6 — Enchantment',fn:r=>getEnchant(c.cls,r),nameKey:'name',descKey:'desc',col:'#ffd54f',
opts:(ENCHANTMENTS[c.cls]||[]).map(e=>`<option value="${e.r[0]}">${rangeLabel(e.r)} — ${e.name}</option>`).join('')},
{key:'destinyRoll',label:'Roll 7 — Destiny Thread',fn:r=>getDestiny(c.cls,r),nameKey:'thread',descKey:null,col:'#ce93d8',
opts:(DESTINY_THREADS[c.cls]||[]).map(d=>`<option value="${d.r[0]}">${rangeLabel(d.r)} — ${d.thread.slice(0,50)}...</option>`).join('')},
];
return rolls.map(({key,label,fn,nameKey,descKey,col,opts})=>{
const roll=c[key];const result=roll?fn(roll):null;
const color=typeof col==='function'?(roll?col(roll):'#bbb'):col;
return`<div style="margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,255,255,0.04)"> <div style="font-size:0.66rem;color:var(--dim);margin-bottom:6px;font-family:Arial,sans-serif;font-weight:bold">${label}</div> <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;flex-wrap:wrap"> <button class="btn btn-sm" style="flex-shrink:0" onclick="STATE.creation['${key}']=d20();render()">🎲 Roll</button> <input type="number" min="1" max="20" class="input" style="width:56px;flex-shrink:0" value="${roll||''}" oninput="STATE.creation['${key}']=parseInt(this.value)||null;render()" placeholder="1-20"> <select class="select" style="flex:1;font-size:0.65rem" onchange="STATE.creation['${key}']=parseInt(this.value)||null;render()"> <option value="">— or pick —</option>${opts} </select> </div> ${result?`<div style="background:rgba(10,8,30,0.9);border:1px solid ${color}40;border-radius:6px;padding:8px 12px">
<div style="color:${color};font-weight:bold;font-size:0.76rem;margin-bottom:3px">${esc(result[nameKey]||'')}</div>
${descKey&&result[descKey]?`<div style="font-size:0.66rem;color:#888;font-family:Arial,sans-serif">${esc(result[descKey])}</div>`:''}
${nameKey==='thread'?`<div style="font-size:0.68rem;color:#888;font-style:italic;font-family:Arial,sans-serif">${esc(result.thread||'')}</div>`:''}
</div>`:''} </div>`;
}).join('')+creationPreview(c);
}

function creationPreview(c){
if(!c.repRoll&&!c.weaponRoll)return'';
const rep=c.repRoll?getRep(c.cls,c.repRoll):null;
const wpn=c.weaponRoll?getWeapon(c.cls,c.weaponRoll):null;
const skl=c.skillRoll?getSkill(c.cls,c.skillRoll):null;
const shd=c.shadowRoll?getShadow(c.cls,c.shadowRoll):null;
const dest=c.destinyRoll?getDestiny(c.cls,c.destinyRoll):null;
return`<div style="background:rgba(138,90,220,0.05);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:8px"> <div style="font-size:0.58rem;color:var(--purple-light);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-family:Arial,sans-serif">Character Preview</div> <div style="font-weight:bold;font-size:0.8rem;color:#fff;margin-bottom:4px">${esc(c.charname||'—')} · ${CLASS_ICON[c.cls]||''} ${c.cls}</div> ${rep?`<div style="font-size:0.66rem;color:var(--gold);font-style:italic;margin-bottom:2px">✦ ${esc(rep.title)}</div>`:''} ${wpn?`<div style="font-size:0.66rem;color:${RARITY_COLOR[wpn.rarity]||'#bbb'};margin-bottom:2px">⚔️ ${esc(wpn.name)}</div>`:''} ${skl?`<div style="font-size:0.66rem;color:var(--blue);margin-bottom:2px">⚡ ${esc(skl.name)}</div>`:''} ${shd?`<div style="font-size:0.66rem;color:var(--red);margin-bottom:2px">🌑 ${esc(shd.name)}</div>`:''} ${dest?`<div style="font-size:0.65rem;color:#ce93d8;font-style:italic">🔮 “${esc(dest.thread.slice(0,80))}…”</div>`:''}</div>`;
}

function renderNPCs() {
  if (!STATE.npcMainTab) STATE.npcMainTab = 'hq';
  const nav = `
    <div class="tabs" style="margin-bottom:15px; border-radius:8px; border:1px solid var(--border); overflow:hidden">
      <div class="tab ${STATE.npcMainTab === 'hq' ? 'active' : ''}" style="flex:1; text-align:center; background:rgba(10,8,30,0.8); padding:10px 4px" onclick="STATE.npcMainTab='hq';render()">🏠 HQ Residents</div>
      <div class="tab ${STATE.npcMainTab === 'world' ? 'active' : ''}" style="flex:1; text-align:center; background:rgba(10,8,30,0.8); padding:10px 4px" onclick="STATE.npcMainTab='world';render()">🌍 World NPCs</div>
    </div>
  `;
  let content = '';

  if (STATE.npcMainTab === 'hq') {
    let residentHTML = '<div class="empty-state">No residents currently at HQ.</div>';
    if (STATE.baseResidents.length > 0) {
      residentHTML = STATE.baseResidents.map((r, i) => {
        const roleData = RESIDENT_ROLES[r.role] || {icon:'👤', label:'Unknown', color:'#bbb', bonus:''};
        const loyalty = r.loyalty !== undefined ? r.loyalty : 5;
        const loyaltyColor = loyalty >= 8 ? 'var(--green)' : loyalty <= 3 ? 'var(--red)' : 'var(--gold)';
        const loyaltyText = loyalty >= 8 ? 'Devoted' : loyalty <= 3 ? 'Flight Risk' : 'Neutral';
        return `
          <div class="card" style="border-left: 4px solid ${roleData.color}; padding:12px; margin-bottom:10px; background:rgba(15,10,25,0.8)">
            <div style="display:flex; justify-content:space-between; align-items:flex-start">
              <div style="display:flex; gap:10px; align-items:center">
                <div style="font-size:1.8rem; filter:drop-shadow(0 0 5px ${roleData.color}80)">${roleData.icon}</div>
                <div>
                  <div style="font-weight:bold; font-size:1.1rem; color:#fff">${esc(r.name)}</div>
                  <div style="font-size:0.65rem; color:${roleData.color}; text-transform:uppercase; letter-spacing:1px">${roleData.label}</div>
                </div>
              </div>
              <button class="btn btn-sm btn-red" style="padding:4px 8px" onclick="rmResident(${i})">✕</button>
            </div>
            <div style="font-size:0.68rem; color:var(--text); margin:10px 0; background:rgba(0,0,0,0.4); padding:8px; border-radius:6px; border:1px solid rgba(255,255,255,0.05)">
              <span style="color:var(--purple-light); font-weight:bold">✦ HQ Perk:</span> ${roleData.bonus}
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; border-top:1px solid rgba(255,255,255,0.05); padding-top:10px">
              <div style="font-size:0.7rem; color:var(--dim)">
                Loyalty: <b style="color:${loyaltyColor}">${loyalty}/10</b> <span style="font-size:0.55rem; color:${loyaltyColor}">(${loyaltyText})</span>
              </div>
              <div style="display:flex; gap:4px">
                <button class="btn btn-sm" style="padding:2px 10px; border-color:var(--red); color:var(--red); font-size:0.8rem" onclick="adjLoyalty(${i}, -1)">-</button>
                <button class="btn btn-sm" style="padding:2px 10px; border-color:var(--green); color:var(--green); font-size:0.8rem" onclick="adjLoyalty(${i}, 1)">+</button>
              </div>
            </div>
            <div style="display:flex; flex-direction:column; gap:6px">
              <input class="input" style="font-size:0.65rem; padding:6px; background:rgba(0,0,0,0.3); border-color:rgba(255,255,255,0.1)" placeholder="Current Status" value="${esc(r.status || '')}" onblur="updateResident(${i}, 'status', this.value)">
              <textarea class="textarea" style="font-size:0.65rem; padding:6px; min-height:45px; background:rgba(0,0,0,0.3); border-color:rgba(255,255,255,0.1)" placeholder="GM Notes & Secrets..." onblur="updateResident(${i}, 'note', this.value)">${esc(r.note || '')}</textarea>
            </div>
          </div>
        `;
      }).join('');
    }

    content = `
      <div class="card-glow">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
          <div class="section-title" style="margin-bottom:0">🏠 Moon Squad HQ</div>
          <button class="btn btn-sm btn-green" onclick="STATE.showAddResident=!STATE.showAddResident;render()">
            ${STATE.showAddResident ? '✕ Cancel' : '+ Hire NPC'}
          </button>
        </div>
        ${STATE.showAddResident ? `
          <div class="roll-box" style="margin-bottom:12px; background:rgba(10,50,20,0.1); border-color:var(--green)">
            <label class="label">NPC Name</label>
            <input class="input" id="res-name" placeholder="Enter name..." style="margin-bottom:8px">
            <label class="label">Role</label>
            <select class="select" id="res-role" style="margin-bottom:10px">
              ${Object.entries(RESIDENT_ROLES).map(([k, r]) => `<option value="${k}">${r.icon} ${r.label}</option>`).join('')}
            </select>
            <button class="btn btn-purple btn-full" style="background:var(--green); color:#000; border:none" onclick="addResident()">Hire Resident</button>
          </div>
        ` : ''}
        ${residentHTML}
      </div>
    `;

  } else if (STATE.npcMainTab === 'world') {
    const npcNames = Object.keys(WORLD_NPCS);
    if (!STATE.worldNpcTab) STATE.worldNpcTab = npcNames[0];
    if (!STATE.worldNpcSec) STATE.worldNpcSec = 'lore';
    const n = WORLD_NPCS[STATE.worldNpcTab];

    const npcListNav = `
      <div class="arsenal-nav" style="margin-bottom:12px">
        ${npcNames.map(name => `<div class="arsenal-tab ${STATE.worldNpcTab === name ? 'active' : ''}" onclick="STATE.worldNpcTab='${name}';STATE.worldNpcSec='lore';render()">${WORLD_NPCS[name].icon} ${name.split(',')[0]}</div>`).join('')}
      </div>
    `;
    const subNav = `
      <div class="lore-tab-bar" style="margin-bottom:12px">
        ${['lore', 'rules', 'shop'].map(sec => `<div class="lore-tab ${STATE.worldNpcSec === sec ? 'active' : ''}" onclick="STATE.worldNpcSec='${sec}';render()">${sec === 'lore' ? 'Identity & Lore' : sec === 'rules' ? 'Encounter Rules' : 'The Shop'}</div>`).join('')}
      </div>
    `;

    let secContent = '';
    if (STATE.worldNpcSec === 'lore') {
      secContent = `
        <div style="font-size:0.75rem; color:var(--gold); font-style:italic; margin-bottom:10px; padding-left:8px; border-left:2px solid var(--gold)">"${n.quote}"</div>
        <div style="font-size:0.7rem; color:var(--text); line-height:1.5; margin-bottom:12px"><b>Lore:</b> ${n.lore}</div>
        <div style="font-size:0.65rem; color:var(--dim); background:rgba(0,0,0,0.3); padding:8px; border-radius:6px"><b>Senses:</b> ${n.sensory}</div>
      `;
    } else if (STATE.worldNpcSec === 'rules') {
      secContent = `
        <div style="background:rgba(0,0,0,0.3); padding:8px; border-radius:6px; margin-bottom:8px">
          <div style="font-size:0.6rem; color:var(--blue); text-transform:uppercase; margin-bottom:2px">📍 Location</div>
          <div style="font-size:0.75rem; color:#fff; font-weight:bold">${n.region} <span style="color:${DANGER_COLORS[n.danger]}; font-size:0.65rem; font-weight:normal">(Danger: ${n.danger}/5)</span></div>
        </div>
        <div style="background:rgba(239,83,80,0.1); padding:8px; border-radius:6px; margin-bottom:8px; border:1px solid rgba(239,83,80,0.3)">
          <div style="font-size:0.6rem; color:var(--red); text-transform:uppercase; margin-bottom:2px">🎲 Spawn Rules</div>
          <div style="font-size:0.7rem; color:#fff">${n.spawn}</div>
        </div>
        <div style="background:rgba(138,90,220,0.1); padding:8px; border-radius:6px; border:1px solid rgba(138,90,220,0.3)">
          <div style="font-size:0.6rem; color:var(--purple-light); text-transform:uppercase; margin-bottom:2px">Interaction</div>
          <div style="font-size:0.65rem; color:#fff">${n.interaction}</div>
        </div>
      `;
    } else if (STATE.worldNpcSec === 'shop') {
      secContent = `
        <div class="section-title" style="margin-bottom:6px">Inventory & Services</div>
        ${n.inventory.map(item => `
          <div style="background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.05); padding:8px; border-radius:6px; margin-bottom:6px">
            <div style="display:flex; justify-content:space-between; align-items:flex-start">
              <span style="font-size:0.75rem; font-weight:bold; color:#fff">${item.item}</span>
              <span style="font-size:0.65rem; color:var(--dim); text-align:right">Stock: <b style="color:${item.chance.includes('100') || item.chance.includes('Always') ? 'var(--green)' : 'var(--gold)'}">${item.chance}</b></span>
            </div>
            <div style="font-size:0.65rem; color:${n.color}; margin-top:4px; font-weight:bold">Cost: ${item.cost}</div>
          </div>
        `).join('')}
      `;
    }

    content = npcListNav + `
      <div class="card-glow" style="border-color:${n.color}40">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px">
          <div style="font-size:1.4rem; font-weight:bold; color:#fff">${n.icon} ${n.name}</div>
          <div style="font-size:0.6rem; color:${n.color}; border:1px solid ${n.color}; padding:2px 6px; border-radius:10px">${n.role}</div>
        </div>
        <div style="font-size:0.65rem; color:var(--dim); margin-bottom:12px">${n.title}</div>
        ${subNav}
        <div class="fade-in" style="min-height:160px">
          ${secContent}
        </div>
      </div>
    `;
  }
  return nav + content;
}

function renderVillains() {
  const custVil = STATE.customVillains || [];
  const allVillains = [...VILLAIN_LORE, ...custVil];
  const activeVillains = allVillains.filter(v => (STATE.villainsLive || []).includes(v.id));
  const inactiveVillains = allVillains.filter(v => !(STATE.villainsLive || []).includes(v.id));

  const buildCard = (v, isActive) => {
    const currentPhaseIdx = (STATE.villainPhases && STATE.villainPhases[v.id] !== undefined) ? STATE.villainPhases[v.id] : 0;
    const phase = v.phases[currentPhaseIdx];
    const baseDC = 10 + (v.phases.length - currentPhaseIdx); 
    const baseLeth = currentPhaseIdx + 2; 
    
    const dc = (STATE.villainOverrides && STATE.villainOverrides[v.id]?.dc) || baseDC;
    const leth = (STATE.villainOverrides && STATE.villainOverrides[v.id]?.leth) || baseLeth;
    const isDcOver = STATE.villainOverrides && STATE.villainOverrides[v.id]?.dc;
    const isLethOver = STATE.villainOverrides && STATE.villainOverrides[v.id]?.leth;
    const emp = (STATE.villainEmpires && STATE.villainEmpires[v.id]) || {territory: 100, lieutenants: 3};

    return `
    <div class="card" style="border-color:${v.color}${isActive ? '90' : '30'}; background:rgba(20,10,30,${isActive ? '0.8' : '0.4'}); margin-bottom:12px">
      <div style="display:flex; justify-content:space-between; align-items:center">
        <div style="display:flex; gap:10px; align-items:center">
          <span style="font-size:1.5rem; ${!isActive ? 'filter:grayscale(1); opacity:0.6;' : ''}">${v.icon}</span>
          <div>
            <div style="font-weight:bold; color:${isActive ? '#fff' : 'var(--dim)'}">${esc(v.name)}</div>
            <div style="font-size:0.6rem; color:${v.color}">${esc(v.title)}</div>
          </div>
        </div>
        <div style="display:flex; gap:5px">
          ${isActive ? `<button class="btn btn-sm btn-red" onclick="toggleVillain('${v.id}')">Retire</button>` : `<button class="btn btn-sm btn-green" onclick="toggleVillain('${v.id}')">Activate</button>`}
        </div>
      </div>

      ${isActive ? `
      <div class="roll-box" style="margin-top:12px; border-color:${phase.color}60; background:${phase.color}10">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
          <div style="font-size:0.65rem; color:${phase.color}; font-weight:bold; text-transform:uppercase">Active: ${phase.name}</div>
          <div style="font-size:0.65rem; color:var(--dim)">${phase.hp}</div>
        </div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px">
          <div style="background:rgba(0,0,0,0.3); padding:6px; border-radius:6px; border:1px solid ${isDcOver?'var(--gold)':'transparent'}">
            <div class="label" style="margin-bottom:2px">Threat DC</div>
            <input type="number" class="input" style="height:24px; font-weight:bold; color:${isDcOver?'var(--gold)':'#fff'}" value="${dc}" onchange="overrideVillain('${v.id}', 'dc', this.value)">
          </div>
          <div style="background:rgba(0,0,0,0.3); padding:6px; border-radius:6px; border:1px solid ${isLethOver?'var(--gold)':'transparent'}">
            <div class="label" style="margin-bottom:2px">Lethality</div>
            <input type="number" class="input" style="height:24px; font-weight:bold; color:${isLethOver?'var(--gold)':'#fff'}" value="${leth}" onchange="overrideVillain('${v.id}', 'leth', this.value)">
          </div>
        </div>

        <div class="phase-bar" style="margin-bottom:10px">
          ${v.phases.map((p, i) => `<div class="phase-pip" style="background:${i <= currentPhaseIdx ? p.color : 'rgba(255,255,255,0.1)'}; cursor:pointer" onclick="updateVillainPhase('${v.id}', ${i})"></div>`).join('')}
        </div>
        
        <div style="border-top:1px solid rgba(255,255,255,0.1); padding-top:8px; margin-top:8px">
          <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.65rem; margin-bottom:4px">
            <span style="color:var(--dim)">Territory Control: <b style="color:${emp.territory > 50 ? 'var(--red)' : 'var(--gold)'}">${emp.territory}%</b></span>
            <div style="display:flex; gap:4px">
              <button class="btn btn-sm" style="padding:2px 6px; border-color:var(--green); color:var(--green)" onclick="adjEmpire('${v.id}', 'territory', -10)">-10%</button>
              <button class="btn btn-sm" style="padding:2px 6px; border-color:var(--red); color:var(--red)" onclick="adjEmpire('${v.id}', 'territory', 10)">+10%</button>
            </div>
          </div>
          <div style="display:flex; justify-content:space-between; align-items:center; font-size:0.65rem">
            <span style="color:var(--dim)">Active Lieutenants: <b style="color:${emp.lieutenants > 0 ? 'var(--red)' : 'var(--dim)'}">${emp.lieutenants}</b></span>
            <div style="display:flex; gap:4px">
              <button class="btn btn-sm" style="padding:2px 6px; border-color:var(--green); color:var(--green)" onclick="adjEmpire('${v.id}', 'lieutenants', -1)">Killed</button>
            </div>
          </div>
        </div>
      </div>
      ` : ''}

      <div class="lore-tab-bar" style="margin-top:12px">
        ${['lore', 'combat', 'phases', 'loot'].map(sec => `
          <div class="lore-tab ${STATE.villainTab === v.id && STATE.villainSec === sec ? 'active' : ''}" onclick="STATE.villainTab='${v.id}'; STATE.villainSec='${sec}'; render()">
            ${sec.charAt(0).toUpperCase() + sec.slice(1)}
          </div>
        `).join('')}
      </div>
      <div style="margin-top:10px; font-size:0.7rem; min-height:80px; color:var(--text); line-height:1.4">
        ${renderVillainSubSection(v)}
      </div>
    </div>
  `;};

  return `
    <div class="card-glow">
      <div class="section-title" style="color:var(--red)">🎭 ACTIVE BOSSES</div>
      ${activeVillains.length === 0 ? '<div class="empty-state">No villains are currently active.</div>' : activeVillains.map(v => buildCard(v, true)).join('')}
    </div>
    <div class="card">
      <div class="section-title">Bestiary (Inactive)</div>
      ${inactiveVillains.map(v => buildCard(v, false)).join('')}
    </div>
  `;
}

function renderVillainSubSection(v) {
  const sec = (STATE.villainTab === v.id) ? STATE.villainSec : 'lore';
  switch(sec) {
    case 'lore': return `<div><b>Motivation:</b> ${esc(v.motivation)}</div><div style="margin-top:8px; font-style:italic; color:var(--dim)">"${esc(v.lore)}"</div>`;
    case 'combat': return `
      <div class="section-title">Combat Strengths</div>
      ${(v.strengths || []).map(s => `<div style="color:var(--green); margin-bottom:2px">✦ ${esc(s)}</div>`).join('')}
      <div class="section-title" style="margin-top:8px">Weaknesses</div>
      ${(v.weaknesses || []).map(w => `<div style="color:var(--red); margin-bottom:2px">⚔️ ${esc(w)}</div>`).join('')}
    `;
    case 'phases': return (v.phases || []).map(p => `
      <div class="phase-card" style="background:${p.color||'var(--dim)'}15; border:1px solid ${p.color||'var(--dim)'}40; margin-bottom:5px; padding:8px; border-radius:6px">
        <div style="display:flex; justify-content:space-between; font-weight:bold; color:${p.color||'#fff'}">
          <span>P${p.phase}: ${esc(p.name)}</span>
          <span>${esc(p.hp)}</span>
        </div>
        <div style="font-size:0.6rem; color:#ccc; margin-top:2px">${esc(p.desc)}</div>
      </div>
    `).join('');
    case 'loot': return (v.loot || []).map(l => `
      <div style="display:flex; justify-content:space-between; padding:4px 0; border-bottom:1px solid var(--border)">
        <span>${esc(l.item)}</span>
        <span style="color:var(--gold)">${esc(l.chance)}</span>
      </div>
    `).join('');
    default: return 'Select a section above.';
  }
}

  const spin=STATE.diceSpinning;
  const glow=spin?'#b388ff':display?display.glow:'rgba(138,90,220,0.4)';

x-shadow:0 0 30px ${display.glow}40;margin:8px 0 16px">

function renderLog(){
  const elapsed=STATE.sessionActive&&STATE.sessionStartTime?Math.floor((Date.now()-STATE.sessionStartTime)/60000):0;
  const filtered=STATE.sessionLog.filter(e=>(STATE.logFilter==='all'||e.type===STATE.logFilter)&&(!STATE.logSearch||(e.who||'').toLowerCase().includes(STATE.logSearch.toLowerCase())||(e.what||'').toLowerCase().includes(STATE.logSearch.toLowerCase())));
  const sessions=[...new Set(filtered.map(e=>e.session))].sort((a,b)=>b-a);
  return`<div class="card" style="border-color:${STATE.sessionActive?'rgba(102,187,106,0.5)':'var(--border)'};background:${STATE.sessionActive?'rgba(10,40,15,0.9)':'var(--card)'}"> <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${STATE.sessionActive?'10px':'0'}"> <div><div style="font-weight:bold;font-size:0.86rem;color:#fff">${STATE.sessionActive?'<span class="session-live"></span>':''}Session ${STATE.sessionNumber} — ${STATE.sessionActive?'Live':'Standby'}</div> ${STATE.sessionActive?`<div style="font-size:0.62rem;color:var(--green);margin-top:2px;font-family:Arial,sans-serif">Started ${STATE.sessionStartTime?new Date(STATE.sessionStartTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):''} · ${elapsed} min</div>`:''} </div> ${!STATE.sessionActive?`<button class="btn btn-green" onclick="beginSession()">▶ Begin</button>`:`<button class="btn btn-red" onclick="endSession()">⏹ End Session</button>`} </div> ${STATE.sessionActive?`<div style="height:1px;background:linear-gradient(90deg,transparent,rgba(102,187,106,0.3),transparent);margin-bottom:10px"></div>
  <div style="font-size:0.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-family:Arial,sans-serif">Quick Log</div>
  <div style="display:flex;gap:5px;flex-wrap:wrap">
  ${Object.entries(LOG_TYPES).map(([k,t])=>`<button class="btn btn-sm" style="font-size:0.6rem;background:rgba(10,8,30,0.8);color:${t.color};border:1px solid ${t.color}30" onclick="STATE.manualEntry={who:'',what:'',type:'${k}'};render()">${t.icon} ${t.label}</button>`).join('')}
  </div>`:''}
  </div>
  ${STATE.manualEntry.type&&STATE.sessionActive?`<div class="card" style="border-color:${LOG_TYPES[STATE.manualEntry.type]?.color}40">
    <div style="display:flex;justify-content:space-between;margin-bottom:10px">
      <div style="font-size:0.7rem;color:${LOG_TYPES[STATE.manualEntry.type]?.color};font-weight:bold;font-family:Arial,sans-serif">${LOG_TYPES[STATE.manualEntry.type]?.icon} Log ${LOG_TYPES[STATE.manualEntry.type]?.label}</div>
      <button style="background:none;border:none;color:var(--dim);cursor:pointer" onclick="STATE.manualEntry.type=null;render()">✕</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <div style="flex:0 0 130px"><label class="label">Who</label>
        <input class="input" id="log-who" value="${esc(STATE.manualEntry.who)}" oninput="STATE.manualEntry.who=this.value" placeholder="@player or DM" list="whl">
        <datalist id="whl"><option value="DM">${STATE.players.filter(p=>!p.isDead).map(p=>`<option>${esc(p.charname)}</option>`).join('')}</datalist>
      </div>
      <div style="flex:1"><label class="label">What happened</label>
        <input class="input" id="log-what" value="${esc(STATE.manualEntry.what)}" oninput="STATE.manualEntry.what=this.value" placeholder="Describe..." onkeydown="if(event.key==='Enter')submitLogEntry()">
      </div>
    </div>
    <button class="btn btn-purple" onclick="submitLogEntry()">+ Add to Log</button>
  </div>`:''}
  ${STATE.sessionLog.length?`
    <div class="card">
      <input class="input" style="margin-bottom:8px" placeholder="🔍 Search..." value="${esc(STATE.logSearch)}" oninput="STATE.logSearch=this.value;render()">
      <div style="display:flex;gap:5px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;margin-bottom:10px">
        <button class="btn btn-sm" style="${STATE.logFilter==='all'?'background:rgba(138,90,220,0.2);color:var(--purple-light);border-color:var(--purple)':''}" onclick="STATE.logFilter='all';render()">All (${STATE.sessionLog.length})</button>
        ${Object.entries(LOG_TYPES).map(([k,t])=>{const cnt=STATE.sessionLog.filter(e=>e.type===k).length;if(!cnt)return'';return`<button class="btn btn-sm" style="flex-shrink:0;${STATE.logFilter===k?'background:rgba(10,8,30,0.9);color:'+t.color+';border-color:'+t.color:''}" onclick="STATE.logFilter='${k}';render()">${t.icon} ${cnt}</button>`;}).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="font-size:0.62rem;color:var(--dim);font-family:Arial,sans-serif">${filtered.length} entries</span>
        <button class="btn btn-sm" style="background:rgba(60,10,10,0.6);color:#888" onclick="if(STATE.sessionLog.length){STATE.sessionLog.splice(STATE.sessionLog.length-1,1);save('session_log',STATE.sessionLog);render()}">↩ Undo</button>
      </div>
    </div>
    ${sessions.map(sNum=>{
      const entries=[...filtered.filter(e=>e.session===sNum)].reverse();if(!entries.length)return'';
      const allS=STATE.sessionLog.filter(e=>e.session===sNum);
      const startE=allS.find(e=>e.type==='session'&&(e.what||'').includes('began'));
      const endE=allS.find(e=>e.type==='session'&&(e.what||'').includes('ended'));
      return`<div style="margin-bottom:16px">
        <div class="card" style="padding:8px 12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;border-color:var(--purple-light);">
          <span style="font-weight:bold;font-size:0.86rem;color:var(--purple-light)">Session ${sNum}</span>
          <div style="font-size:0.6rem;color:var(--dim);font-family:Arial,sans-serif;text-align:right">${startE?`<div>Started ${startE.time}</div>`:''}${endE?`<div>Ended ${endE.time}</div>`:''}${allS.length} entries</div>
        </div>
        ${entries.map(e=>{const t=LOG_TYPES[e.type]||LOG_TYPES.note;return`<div class="log-entry ${e.isHoF ? 'hof-log' : ''}">
          <div class="log-time">${e.time||''}</div>
          <div class="log-icon">${t.icon}</div>
          <div class="log-body">
            <div class="log-who" style="color:${e.who==='DM'?'var(--gold)':'var(--purple-light)'}">${esc(e.who||'')} <span style="font-size:0.58rem;padding:1px 5px;border-radius:5px;background:rgba(10,8,30,0.8);color:${t.color};font-family:Arial,sans-serif">${t.label}</span></div>
            <div class="log-what">${esc(e.what||'')}</div>
            ${e.result?`<div style="display:inline-block;margin-top:3px;padding:2px 8px;border-radius:5px;background:${getDiceDisplay(e.result)?.bg||'rgba(30,25,60,0.8)'};border:1px solid ${getDiceDisplay(e.result)?.glow||'var(--border)'};font-size:0.63rem;font-weight:bold;color:#fff;font-family:Arial,sans-serif">${e.result} — ${e.label||''}</div>`:''}
          </div>
        </div>`;}).join('')}
      </div>`;
    }).join('')}
    <div style="text-align:center;margin-top:16px;padding-top:12px;border-top:1px solid var(--dimmer)">
      <button class="btn btn-sm" style="background:rgba(40,10,10,0.8);color:#888" onclick="if(confirm('Clear all logs?')){STATE.sessionLog=[];STATE.sessionNumber=1;STATE.sessionActive=false;STATE.sessionStartTime=null;saveAll();render()}">🗑 Clear All</button>
    </div>
  `:`<div class="empty-state"><div class="empty-icon">⏱</div><div>No session started yet.</div></div>`}`;
}

// ═══════════════════════════════════════════════════
// ABSOLUTE SYNC — PARALLAX & PARTICLES
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const bg = document.getElementById('bg-layer');

let pts = [];
let m = { x: 0, y: 0, active: false, sx: 0, sy: 0 };
let drawing = false;

function resize() { 
    canvas.width = window.innerWidth; 
    canvas.height = window.innerHeight; 
}
window.addEventListener('resize', resize); 
resize();

class Particle {
    constructor(x, y, color, size, vx, vy, life) {
        this.x = x; this.y = y; this.size = size; this.color = color;
        this.vx = vx; this.vy = vy; this.life = life;
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.globalCompositeOperation = 'screen';
        let g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
        g.addColorStop(0, this.color); 
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g; 
        ctx.beginPath(); 
        ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); 
        ctx.fill();
    }
}

function loopParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (m.active) {
        let tx = (m.x - window.innerWidth/2) / 20;
        let ty = (m.y - window.innerHeight/2) / 20;
        bg.style.transform = `translate(${-tx}px, ${-ty}px)`;
    }

    if (m.active && drawing) {
        pts.push(new Particle(m.x, m.y, '#9b1b1b', 65, (Math.random()-0.5), (Math.random()-0.5), 0.7));
        if(Math.random() > 0.6) pts.push(new Particle(m.x, m.y, '#00d4ff', 30, 0, 0, 0.5));
    }

    pts.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.life -= 0.02; p.size += 0.4;
        p.draw();
        if(p.life <= 0) pts.splice(i, 1);
    });
    requestAnimationFrame(loopParticles);
}

function startDraw(e) {
    let t = e.touches ? e.touches[0] : e;
    m.active = true; m.sx = t.clientX; m.sy = t.clientY; m.x = t.clientX; m.y = t.clientY; drawing = false;
}
function moveDraw(e) {
    let t = e.touches ? e.touches[0] : e;
    m.x = t.clientX; m.y = t.clientY;
    if(!drawing && Math.abs(t.clientX - m.sx) > 15) drawing = true;
}
function endDraw() { m.active = false; drawing = false; }

window.addEventListener('mousedown', startDraw); 
window.addEventListener('mousemove', moveDraw); 
window.addEventListener('mouseup', endDraw);
window.addEventListener('touchstart', startDraw, {passive: true}); 
window.addEventListener('touchmove', moveDraw, {passive: true}); 
window.addEventListener('touchend', endDraw);

loopParticles();

// ═══════════════════════════════════════════════════
// INITIALIZATION
// ═══════════════════════════════════════════════════
render();

</script>
