<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hollow Realm — Smart Scroll Wake</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; color: #fff;
            font-family: 'Inter', sans-serif; overflow: hidden;
            touch-action: pan-y; /* Allows vertical scrolling but not horizontal */
        }

        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        /* SCROLLABLE CONTENT AREA */
        #scroll-container {
            position: relative; z-index: 10; width: 100%; height: 100vh;
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            padding: 20px; box-sizing: border-box;
        }

        .hq-card {
            background: rgba(10, 8, 30, 0.85);
            border: 1px solid rgba(196, 130, 72, 0.3);
            border-radius: 12px; padding: 40px 20px; margin-bottom: 20px;
            text-align: center; backdrop-filter: blur(10px);
        }

        .label { font-size: 0.6rem; color: #c48248; letter-spacing: 4px; margin-bottom: 30px; text-align: center;}
    </style>
</head>
<body>

    <canvas id="trailCanvas"></canvas>

    <div id="scroll-container">
        <div class="label">SCROLL DOWN VS SLASH SIDEWAYS</div>
        
        <div class="hq-card">MOON SQUAD HQ</div>
        <div class="hq-card">THE ASHTRAY SAVANNAH</div>
        <div class="hq-card">GARRISON REMNANT</div>
        <div class="hq-card">DROWNED ARCHIVE</div>
        <div class="hq-card">THE HOLLOW'S EDGE</div>
        <div class="hq-card">THE BEYOND</div>
        <div class="hq-card">FINAL GATEWAY</div>
    </div>

    <script>
        const canvas = document.getElementById('trailCanvas');
        const ctx = canvas.getContext('2d');
        const scrollArea = document.getElementById('scroll-container');

        let points = [];
        let mouse = { x: -100, y: -100, active: false, startX: 0, startY: 0 };
        let isDrawing = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Only draw if we've identified a "Slash" (sideways move)
            if (mouse.active && isDrawing) {
                points.push({ x: mouse.x, y: mouse.y, age: 0 });
            }

            if (points.length > 1) {
                ctx.shadowBlur = 12;
                ctx.shadowColor = '#9d72ff';

                for (let i = 0; i < points.length; i++) {
                    const p = points[i];
                    const nextP = points[i + 1];

                    if (nextP) {
                        const life = 1 - (p.age / 30);
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(nextP.x, nextP.y);
                        ctx.strokeStyle = `rgba(157, 114, 255, ${life})`;
                        ctx.lineWidth = 12 * life;
                        ctx.lineCap = 'round';
                        ctx.stroke();
                    }

                    p.age += 1;
                    if (p.age > 30) { points.splice(i, 1); i--; }
                }
            }
            requestAnimationFrame(animate);
        }

        // SMART INPUT LOGIC
        function handleStart(e) {
            const t = e.touches ? e.touches[0] : e;
            mouse.active = true;
            mouse.startX = t.clientX;
            mouse.startY = t.clientY;
            mouse.x = t.clientX;
            mouse.y = t.clientY;
            isDrawing = false; // Reset drawing state
        }

        function handleMove(e) {
            const t = e.touches ? e.touches[0] : e;
            const moveX = Math.abs(t.clientX - mouse.startX);
            const moveY = Math.abs(t.clientY - mouse.startY);

            // If moving horizontally more than vertically, trigger the Warden's Wake
            if (moveX > 15 && moveX > moveY) {
                isDrawing = true;
            }

            mouse.x = t.clientX;
            mouse.y = t.clientY;
        }

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => { mouse.active = false; isDrawing = false; });

        window.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', () => { mouse.active = false; isDrawing = false; });

        animate();
    </script>
</body>
</html>
