<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Squad — Absolute Sync</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; touch-action: none; 
        }

        /* DIRECT LOCAL FILE REFERENCE */
        #bg-layer {
            position: fixed; 
            top: -10%; left: -10%; 
            width: 120%; height: 120%;
            background-image: url('IMG_5121.png');
            background-size: cover; 
            background-position: center;
            z-index: 1; /* Sits at the very back */
            pointer-events: none;
            transition: transform 0.1s ease-out;
            filter: brightness(0.8);
        }

        /* Canvas sits on top of the background but below the UI */
        canvas { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 5; 
            pointer-events: none; 
        }

        #ui-header {
            position: relative; 
            z-index: 10; 
            width: 100%; 
            text-align: center;
            padding-top: 50px; 
            pointer-events: none;
        }

        h1 { 
            color: #d35400; 
            font-size: 2.5rem; 
            letter-spacing: 15px; 
            text-shadow: 0 0 20px #9b1b1b, 0 0 10px #000; 
            margin: 0;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <canvas id="c"></canvas>

    <div id="ui-header">
        <h1>MOON SQUAD</h1>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const bg = document.getElementById('bg-layer');
        
        let pts = [];
        let m = { x: 0, y: 0, active: false, sx: 0, sy: 0 };
        let drawing = false;

        function resize() { 
            canvas.width = window.innerWidth; 
            canvas.height = window.innerHeight; 
        }
        window.addEventListener('resize', resize); 
        resize();

        class Particle {
            constructor(x, y, color, size, vx, vy, life) {
                this.x = x; this.y = y; this.size = size; this.color = color;
                this.vx = vx; this.vy = vy; this.life = life;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.globalCompositeOperation = 'screen';
                let g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                g.addColorStop(0, this.color); 
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; 
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); 
                ctx.fill();
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (m.active) {
                // Parallax Shift
                let tx = (m.x - window.innerWidth/2) / 20;
                let ty = (m.y - window.innerHeight/2) / 20;
                bg.style.transform = `translate(${-tx}px, ${-ty}px)`;
            }

            if (m.active && drawing) {
                // Crimson smoke
                pts.push(new Particle(m.x, m.y, '#9b1b1b', 65, (Math.random()-0.5), (Math.random()-0.5), 0.7));
                // Cyan spark
                if(Math.random() > 0.6) pts.push(new Particle(m.x, m.y, '#00d4ff', 30, 0, 0, 0.5));
            }

            pts.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02; p.size += 0.4;
                p.draw();
                if(p.life <= 0) pts.splice(i, 1);
            });
            requestAnimationFrame(loop);
        }

        function start(e) {
            let t = e.touches ? e.touches[0] : e;
            m.active = true; m.sx = t.clientX; m.sy = t.clientY; m.x = t.clientX; m.y = t.clientY; drawing = false;
        }
        function move(e) {
            let t = e.touches ? e.touches[0] : e;
            m.x = t.clientX; m.y = t.clientY;
            if(!drawing && Math.abs(t.clientX - m.sx) > 15) drawing = true;
        }
        function end() { m.active = false; drawing = false; }

        window.addEventListener('mousedown', start); 
        window.addEventListener('mousemove', move); 
        window.addEventListener('mouseup', end);
        window.addEventListener('touchstart', start); 
        window.addEventListener('touchmove', move); 
        window.addEventListener('touchend', end);

        loop();
    </script>
</body>
</html>
