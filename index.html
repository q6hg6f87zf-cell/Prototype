<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hollow Realm — Scroll vs Wake Test</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; color: #fff;
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* THE ACTUAL CONTENT YOU NEED TO SCROLL */
        #scroll-layer {
            position: relative; z-index: 10;
            width: 100%; height: 100vh;
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            padding: 20px; box-sizing: border-box;
            background: transparent;
        }

        .header {
            font-size: 1.2rem; font-weight: bold; color: #c48248;
            text-align: center; margin: 40px 0; letter-spacing: 5px;
        }

        .archive-item {
            background: rgba(15, 12, 40, 0.8);
            border: 1px solid rgba(196, 130, 72, 0.2);
            padding: 20px; margin-bottom: 15px; border-radius: 8px;
            backdrop-filter: blur(5px);
        }

        .archive-id { font-size: 0.6rem; color: #8b85a1; margin-bottom: 5px; }
        .archive-title { font-weight: bold; color: #9d72ff; }
        
        .instruction-box {
            background: rgba(157, 114, 255, 0.1);
            border: 1px solid #9d72ff; padding: 15px;
            border-radius: 8px; margin-bottom: 30px; font-size: 0.8rem;
            line-height: 1.4; text-align: center;
        }
    </style>
</head>
<body>

    <canvas id="trailCanvas"></canvas>

    <div id="scroll-layer">
        <div class="header">MOON SQUAD ARCHIVES</div>

        <div class="instruction-box">
            <b>TEST LOGIC:</b><br>
            1. Scroll UP/DOWN to read the list.<br>
            2. Swipe LEFT/RIGHT to trigger the Warden's Wake.
        </div>

        <div id="content-anchor"></div>
    </div>

    <script>
        // Populate items
        const anchor = document.getElementById('content-anchor');
        for(let i=1; i<=20; i++) {
            anchor.innerHTML += `
                <div class="archive-item">
                    <div class="archive-id">LOG_ENTRY_#00${i}</div>
                    <div class="archive-title">Scouting Mission: Sector ${i*7}</div>
                    <p style="font-size: 0.7rem; color: #bbb; margin-top:10px;">
                        The Static in this region is measured at ${Math.floor(Math.random()*100)}%. 
                        Moon Squad members are advised to check their Lockboxes before proceeding.
                    </p>
                </div>
            `;
        }

        const canvas = document.getElementById('trailCanvas');
        const ctx = canvas.getContext('2d');
        let points = [];
        let mouse = { x: 0, y: 0, active: false, startX: 0, startY: 0 };
        let isDrawing = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (mouse.active && isDrawing) {
                points.push({ x: mouse.x, y: mouse.y, age: 0 });
            }
            if (points.length > 1) {
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#9d72ff';
                for (let i = 0; i < points.length; i++) {
                    const p = points[i];
                    const nextP = points[i + 1];
                    if (nextP) {
                        const life = 1 - (p.age / 30);
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(nextP.x, nextP.y);
                        ctx.strokeStyle = `rgba(157, 114, 255, ${life})`;
                        ctx.lineWidth = 15 * life;
                        ctx.lineCap = 'round';
                        ctx.stroke();
                    }
                    p.age += 1;
                    if (p.age > 30) { points.splice(i, 1); i--; }
                }
            }
            requestAnimationFrame(animate);
        }

        // Logic to detect swipe direction
        function handleStart(e) {
            const t = e.touches ? e.touches[0] : e;
            mouse.active = true;
            mouse.startX = t.clientX;
            mouse.startY = t.clientY;
            mouse.x = t.clientX;
            mouse.y = t.clientY;
            isDrawing = false;
        }

        function handleMove(e) {
            const t = e.touches ? e.touches[0] : e;
            mouse.x = t.clientX;
            mouse.y = t.clientY;

            if (!isDrawing) {
                const diffX = Math.abs(t.clientX - mouse.startX);
                const diffY = Math.abs(t.clientY - mouse.startY);
                // If moving more horizontally than vertically, trigger the wake
                if (diffX > 20 && diffX > diffY) {
                    isDrawing = true;
                }
            }
        }

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => { mouse.active = false; isDrawing = false; });

        window.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', () => { mouse.active = false; isDrawing = false; });

        animate();
    </script>
</body>
</html>
