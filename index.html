<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Squad — Vivid Nebula</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #020205; color: #fff;
            font-family: sans-serif; overflow: hidden;
            touch-action: none;
        }
        canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        #content {
            position: relative; z-index: 10; width: 100%; height: 100vh;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
        }
        .card {
            background: rgba(10, 5, 15, 0.95);
            border: 1px solid #9b1b1b;
            padding: 30px; margin-bottom: 20px; border-radius: 15px;
            box-shadow: 0 0 20px #9b1b1b33;
        }
        h1 { color: #d35400; text-align: center; letter-spacing: 10px; margin-top: 50px; }
    </style>
</head>
<body>

    <canvas id="nebulaCanvas"></canvas>

    <div id="content">
        <h1>MOON SQUAD</h1>
        <div class="card">
            <h3 style="color:#00d4ff">VIVID_SYNC_PROTOCOL</h3>
            <p style="color:#8b85a1">If you swipe horizontally, you should see three distinct colors now: <b>Crimson smoke, Orange glow, and Cyan lightning.</b></p>
        </div>
        <div class="card">
            <h3 style="color:#d35400">GEOLOGICAL_SENSORS</h3>
            <p style="color:#8b85a1">The colors match the obsidian, blood, and crystal found in the deepest rifts of the Hollow.</p>
        </div>
        <div style="height: 500px;"></div>
    </div>

    <script>
        const canvas = document.getElementById('nebulaCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: 0, y: 0, active: false, startX: 0, startY: 0 };
        let isDrawing = false;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Gas {
            constructor(x, y, color, size) {
                this.x = x; this.y = y;
                this.size = size;
                this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.01;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 1.5;
                this.vy = (Math.random() - 0.5) * 1.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= this.decay;
                this.size += 0.5;
            }
            draw() {
                ctx.globalAlpha = this.life;
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                g.addColorStop(0, this.color);
                g.addColorStop(1, 'transparent');
                ctx.fillStyle = g;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (mouse.active && isDrawing) {
                // FORCE THE THREE COLORS: Crimson, Orange, Cyan
                particles.push(new Gas(mouse.x, mouse.y, '#9b1b1b', 60)); // Crimson Base
                if (Math.random() > 0.3) particles.push(new Gas(mouse.x + 10, mouse.y - 10, '#d35400', 30)); // Orange Core
                if (Math.random() > 0.6) particles.push(new Gas(mouse.x - 10, mouse.y + 10, '#00d4ff', 15)); // Cyan Spark
            }

            particles.forEach((p, i) => {
                p.update();
                p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });

            requestAnimationFrame(animate);
        }

        function handleStart(e) {
            const t = e.touches ? e.touches[0] : e;
            mouse.active = true;
            mouse.startX = t.clientX; mouse.startY = t.clientY;
            mouse.x = t.clientX; mouse.y = t.clientY;
            isDrawing = false;
        }

        function handleMove(e) {
            const t = e.touches ? e.touches[0] : e;
            mouse.x = t.clientX; mouse.y = t.clientY;
            if (!isDrawing) {
                const dx = Math.abs(t.clientX - mouse.startX);
                const dy = Math.abs(t.clientY - mouse.startY);
                if (dx > 20 && dx > dy) isDrawing = true;
            }
        }

        window.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => { mouse.active = false; isDrawing = false; });
        window.addEventListener('touchstart', handleStart);
        window.addEventListener('touchmove', handleMove);
        window.addEventListener('touchend', () => { mouse.active = false; isDrawing = false; });

        animate();
    </script>
</body>
</html>
