<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hollow Realm — Stream Wake Prototype</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050510; color: #e8e0ff;
            font-family: 'Inter', sans-serif; overflow: hidden;
            touch-action: none;
        }

        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

        #ui {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .push-card {
            background: rgba(15, 12, 40, 0.8);
            border: 1px solid rgba(157, 114, 255, 0.3);
            border-radius: 12px; padding: 25px; width: 300px;
            margin: 10px; backdrop-filter: blur(10px);
            transition: transform 0.1s ease-out;
            text-align: center; font-weight: bold;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="ui">
        <div style="font-size: 1.2rem; letter-spacing: 4px; margin-bottom: 20px;">DRAG ACROSS THE CARDS</div>
        <div class="push-card">MOON SQUAD HQ</div>
        <div class="push-card">THE HOLLOW'S EDGE</div>
        <div class="push-card">VOID ENCOUNTER</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cards = document.querySelectorAll('.push-card');

        let particles = [];
        let mouse = { x: -100, y: -100, active: false };

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 2;
                this.speedY = (Math.random() - 0.5) * 2;
                this.opacity = 1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.opacity -= 0.015;
            }
            draw() {
                ctx.fillStyle = `rgba(157, 114, 255, ${this.opacity})`;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Generate particles while dragging
            if (mouse.active) {
                for(let i=0; i<3; i++) particles.push(new Particle(mouse.x, mouse.y));
            }

            particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.opacity <= 0) particles.splice(i, 1);
            });

            // Card Displacement Physics
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const dx = (rect.left + rect.width/2) - mouse.x;
                const dy = (rect.top + rect.height/2) - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 150) {
                    const angle = Math.atan2(dy, dx);
                    const push = (150 - dist) / 8;
                    card.style.transform = `translate(${Math.cos(angle)*push}px, ${Math.sin(angle)*push}px)`;
                } else {
                    card.style.transform = `translate(0, 0)`;
                }
            });

            requestAnimationFrame(animate);
        }

        const move = (e) => {
            const t = e.touches ? e.touches[0] : e;
            mouse.x = t.clientX; mouse.y = t.clientY;
        };

        window.addEventListener('mousedown', () => mouse.active = true);
        window.addEventListener('mouseup', () => mouse.active = false);
        window.addEventListener('mousemove', move);
        window.addEventListener('touchstart', (e) => { mouse.active = true; move(e); });
        window.addEventListener('touchend', () => mouse.active = false);
        window.addEventListener('touchmove', move);

        init(); animate();
    </script>
</body>
</html>
