<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Squad — High Impact</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020205; overflow: hidden; touch-action: none; font-family: sans-serif; }
        canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
        #ui { position: relative; z-index: 10; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
        h1 { color: #d35400; letter-spacing: 15px; text-shadow: 0 0 20px #9b1b1b; }
        .inst { color: #00d4ff; font-size: 0.7rem; letter-spacing: 3px; margin-top: 10px; opacity: 0.7; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui">
        <h1>MOON SQUAD</h1>
        <div class="inst">SWIPE FAST & RELEASE TO BURST</div>
    </div>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        let pts = [];
        let embers = [];
        let m = { x: 0, y: 0, active: false, sx: 0, sy: 0 };
        let drawing = false;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize);
        resize();

        // Create initial drifting embers
        for(let i=0; i<30; i++) {
            embers.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5), vy: (Math.random()-0.5), size: Math.random()*2, color: '#d35400' });
        }

        class Particle {
            constructor(x, y, color, size, vx, vy, life) {
                this.x = x; this.y = y; this.size = size; this.color = color;
                this.vx = vx; this.vy = vy; this.life = life;
            }
            draw() {
                ctx.globalAlpha = this.life;
                let g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                g.addColorStop(0, this.color); g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw background embers
            embers.forEach(e => {
                e.x += e.vx; e.y += e.vy;
                if(e.x < 0) e.x = canvas.width; if(e.x > canvas.width) e.x = 0;
                if(e.y < 0) e.y = canvas.height; if(e.y > canvas.height) e.y = 0;
                
                // Attraction to finger
                if(m.active) {
                    let dx = m.x - e.x; let dy = m.y - e.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if(dist < 200) { e.x += dx*0.02; e.y += dy*0.02; e.color = '#00d4ff'; }
                    else { e.color = '#d35400'; }
                }
                ctx.fillStyle = e.color; ctx.globalAlpha = 0.3; ctx.fillRect(e.x, e.y, e.size, e.size);
            });

            if (m.active && drawing) {
                pts.push(new Particle(m.x, m.y, '#9b1b1b', 50, (Math.random()-0.5), (Math.random()-0.5), 1.0));
                if(Math.random() > 0.7) pts.push(new Particle(m.x, m.y, '#00d4ff', 20, 0, 0, 0.8));
            }

            pts.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02; p.size += 0.2;
                p.draw();
                if(p.life <= 0) pts.splice(i, 1);
            });
            requestAnimationFrame(loop);
        }

        function burst() {
            for(let i=0; i<15; i++) {
                pts.push(new Particle(m.x, m.y, '#00d4ff', 30, (Math.random()-0.5)*10, (Math.random()-0.5)*10, 1.0));
            }
        }

        function start(e) {
            let t = e.touches ? e.touches[0] : e;
            m.active = true; m.sx = t.clientX; m.sy = t.clientY; m.x = t.clientX; m.y = t.clientY; drawing = false;
        }

        function move(e) {
            let t = e.touches ? e.touches[0] : e;
            m.x = t.clientX; m.y = t.clientY;
            if(!drawing && Math.abs(t.clientX - m.sx) > 15) drawing = true;
        }

        function end() { if(drawing) burst(); m.active = false; drawing = false; }

        window.addEventListener('mousedown', start);
        window.addEventListener('mousemove', move);
        window.addEventListener('mouseup', end);
        window.addEventListener('touchstart', start);
        window.addEventListener('touchmove', move);
        window.addEventListener('touchend', end);

        loop();
    </script>
</body>
</html>
