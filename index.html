<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Squad — System Ignite</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #020205; color: #fff;
            font-family: 'Segoe UI', sans-serif; overflow: hidden;
            touch-action: none;
        }
        canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
        
        /* OVERLAY LOGIC */
        #ignite-screen {
            position: fixed; inset: 0; z-index: 100;
            background: #020205; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            transition: opacity 1.5s ease;
        }
        #ignite-btn {
            padding: 20px 40px; border: 2px solid #00d4ff;
            color: #d35400; font-weight: bold; letter-spacing: 10px;
            background: rgba(155, 27, 27, 0.1); border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 30px rgba(155, 27, 27, 0.4);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 10px #9b1b1b; } 50% { transform: scale(1.1); box-shadow: 0 0 40px #00d4ff; } 100% { transform: scale(1); box-shadow: 0 0 10px #9b1b1b; } }

        /* CONTENT */
        #content {
            position: relative; z-index: 10; width: 100%; height: 100vh;
            overflow-y: auto; padding: 20px; box-sizing: border-box;
            opacity: 0; transition: opacity 2s;
        }
        .card {
            background: rgba(10, 5, 20, 0.9);
            border-left: 4px solid #00d4ff; border-right: 4px solid #9b1b1b;
            padding: 30px; margin-bottom: 20px; border-radius: 4px;
        }
        h1 { color: #d35400; text-align: center; letter-spacing: 12px; margin: 40px 0; }
    </style>
</head>
<body>

    <div id="ignite-screen" onclick="beginLaunch()">
        <div id="ignite-btn">IGNITE</div>
        <p style="margin-top: 20px; font-size: 0.6rem; color: #8b85a1; letter-spacing: 2px;">AUTHORIZE WARDEN ACCESS</p>
    </div>

    <canvas id="nebulaCanvas"></canvas>

    <div id="content">
        <h1>MOON SQUAD</h1>
        <div class="card">
            <div style="color:#00d4ff; font-weight:bold; font-size:0.7rem; margin-bottom:10px;">SYSTEM_SYNC: ACTIVE</div>
            <p style="color:#8b85a1">Access Granted. The Hollow Realm interface is live. Swipe horizontally to test the Nebula Static.</p>
        </div>
        <div class="card">
            <div style="color:#d35400; font-weight:bold; font-size:0.7rem; margin-bottom:10px;">LAUNCH_COORDINATES</div>
            <p style="color:#8b85a1">Target Date: <b>May 2nd, 2026</b>. All systems go.</p>
        </div>
        <div style="height: 600px;"></div>
    </div>

    <script>
        const canvas = document.getElementById('nebulaCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let mouse = { x: 0, y: 0, active: false, startX: 0, startY: 0 };
        let isDrawing = false;

        function beginLaunch() {
            document.getElementById('ignite-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ignite-screen').style.display = 'none';
                document.getElementById('content').style.opacity = '1';
                // Big launch burst
                for(let i=0; i<60; i++) {
                    particles.push(new MoonParticle(window.innerWidth/2, window.innerHeight/2, '#9b1b1b', 90, 6));
                    if(i%2==0) particles.push(new MoonParticle(window.innerWidth/2, window.innerHeight/2, '#00d4ff', 40, 4));
                }
            }, 1000);
        }

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class MoonParticle {
            constructor(x, y, color, size, speed) {
                this.x = x; this.y = y; this.size = size; this.life = 1.0;
                this.decay = Math.random() * 0.02 + 0.01; this.color = color;
                this.vx = (Math.random() - 0.5) * speed; this.vy = (Math.random() - 0.5) * speed;
            }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; this.size += 0.5; }
            draw() {
                ctx.globalAlpha = this.life;
                const g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                g.addColorStop(0, this.color); g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (mouse.active && isDrawing) {
                particles.push(new MoonParticle(mouse.x, mouse.y, '#9b1b1b', 50, 1.5));
                if (Math.random() > 0.6) particles.push(new MoonParticle(mouse.x, mouse.y, '#00d4ff', 25, 3));
                if (Math.random() > 0.8) particles.push(new MoonParticle(mouse.x, mouse.y, '#d35400', 40, 2));
            }
            particles.forEach((p, i) => {
                p.update(); p.draw();
                if (p.life <= 0) particles.splice(i, 1);
            });
            requestAnimationFrame(animate);
        }

        function handleInput(e) {
            const t = e.touches ? e.touches[0] : e;
            mouse.x = t.clientX; mouse.y = t.clientY;
            if (!isDrawing && mouse.active) {
                const dx = Math.abs(t.clientX - mouse.startX);
                const dy = Math.abs(t.clientY - mouse.startY);
                if (dx > 20 && dx > dy) isDrawing = true;
            }
        }

        window.addEventListener('mousedown', (e) => { mouse.active = true; mouse.startX = e.clientX; mouse.startY = e.clientY; handleInput(e); });
        window.addEventListener('mousemove', handleInput);
        window.addEventListener('mouseup', () => { mouse.active = false; isDrawing = false; });
        window.addEventListener('touchstart', (e) => { mouse.active = true; mouse.startX = e.touches[0].clientX; mouse.startY = e.touches[0].clientY; handleInput(e); });
        window.addEventListener('touchmove', handleInput);
        window.addEventListener('touchend', () => { mouse.active = false; isDrawing = false; });

        animate();
    </script>
</body>
</html>
