<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moon Squad — Geometry Sync</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; touch-action: none; 
        }

        #bg-layer {
            position: fixed; top: -10%; left: -10%; width: 120%; height: 120%;
            background-image: url('YOUR_IMAGE_URL_HERE');
            background-size: cover; background-position: center;
            z-index: 0; pointer-events: none;
            transition: transform 0.1s ease-out, filter 0.2s;
            filter: brightness(0.8);
        }

        canvas { position: fixed; inset: 0; z-index: 5; pointer-events: none; }

        /* THE LENS FLARE LINE */
        #flare {
            position: fixed; top: 50%; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, #fff, #ffd700, transparent);
            z-index: 6; opacity: 0; pointer-events: none;
            box-shadow: 0 0 20px #d35400; transform: translateY(-50%) scaleX(0);
            transition: opacity 0.3s, transform 0.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .glitch { filter: hue-rotate(90deg) brightness(1.5) !important; }
    </style>
</head>
<body>

    <div id="bg-layer"></div>
    <div id="flare"></div>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById('c');
        const ctx = canvas.getContext('2d');
        const bg = document.getElementById('bg-layer');
        const flare = document.getElementById('flare');
        
        let pts = [];
        let m = { x: 0, y: 0, active: false, sx: 0, sy: 0 };
        let drawing = false;

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        class Particle {
            constructor(x, y, color, size, vx, vy, life) {
                this.x = x; this.y = y; this.size = size; this.color = color;
                this.vx = vx; this.vy = vy; this.life = life;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.globalCompositeOperation = 'screen';
                let g = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
                g.addColorStop(0, this.color); g.addColorStop(1, 'transparent');
                ctx.fillStyle = g; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            }
        }

        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (m.active) {
                // Parallax
                let tx = (m.x - window.innerWidth/2) / 30;
                let ty = (m.y - window.innerHeight/2) / 30;
                bg.style.transform = `translate(${-tx}px, ${-ty}px) scale(1.05)`;

                // Flare Trigger (When crossing the horizontal center diamond area)
                if (Math.abs(m.y - window.innerHeight/2) < 50) {
                    flare.style.opacity = "0.8";
                    flare.style.transform = "translateY(-50%) scaleX(1)";
                } else {
                    flare.style.opacity = "0";
                    flare.style.transform = "translateY(-50%) scaleX(0)";
                }
            }

            if (m.active && drawing) {
                pts.push(new Particle(m.x, m.y, '#9b1b1b', 60, (Math.random()-0.5), (Math.random()-0.5), 0.7));
                if(Math.random() > 0.5) pts.push(new Particle(m.x, m.y, '#00d4ff', 30, 0, 0, 0.5));
            }

            pts.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; p.life -= 0.02; p.size += 0.3;
                p.draw();
                if(p.life <= 0) pts.splice(i, 1);
            });
            requestAnimationFrame(loop);
        }

        function burst() {
            bg.classList.add('glitch');
            setTimeout(() => bg.classList.remove('glitch'), 150);
            for(let i=0; i<25; i++) {
                pts.push(new Particle(m.x, m.y, '#00d4ff', 40, (Math.random()-0.5)*15, (Math.random()-0.5)*15, 1.0));
            }
        }

        function start(e) {
            let t = e.touches ? e.touches[0] : e;
            m.active = true; m.sx = t.clientX; m.sy = t.clientY; m.x = t.clientX; m.y = t.clientY; drawing = false;
        }
        function move(e) {
            let t = e.touches ? e.touches[0] : e;
            m.x = t.clientX; m.y = t.clientY;
            if(!drawing && Math.abs(t.clientX - m.sx) > 15) drawing = true;
        }
        function end() { if(drawing) burst(); m.active = false; drawing = false; }

        window.addEventListener('mousedown', start); window.addEventListener('mousemove', move); window.addEventListener('mouseup', end);
        window.addEventListener('touchstart', start); window.addEventListener('touchmove', move); window.addEventListener('touchend', end);

        loop();
    </script>
</body>
</html>
